<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Hi-res playful sun: extra detail + inner layers + more rays. Only used for large icon_size (>=~64) -->
  <circle cx="12" cy="12" r="5.8" fill="#FFEB3B" stroke="#F9A825" stroke-width="2"/>
  <circle cx="12" cy="12" r="3.8" fill="#FFF176" opacity="0.7"/>
  <!-- Extra short rays for fun when big -->
  <g stroke="#FF9800" stroke-width="2.2" stroke-linecap="round">
    <line x1="12" y1="1.2" x2="12" y2="4.5"/>
    <line x1="12" y1="19.5" x2="12" y2="22.8"/>
    <line x1="1.2" y1="12" x2="4.5" y2="12"/>
    <line x1="19.5" y1="12" x2="22.8" y2="12"/>
    <line x1="3.5" y1="3.5" x2="6.2" y2="6.2"/>
    <line x1="17.8" y1="17.8" x2="20.5" y2="20.5"/>
    <line x1="3.5" y1="20.5" x2="6.2" y2="17.8"/>
    <line x1="17.8" y1="6.2" x2="20.5" y2="3.5"/>
    <!-- short fun rays -->
    <line x1="7.5" y1="1.8" x2="8.8" y2="4.2"/>
    <line x1="15.2" y1="1.8" x2="16.5" y2="4.2"/>
    <line x1="1.8" y1="7.5" x2="4.2" y2="8.8"/>
    <line x1="1.8" y1="16.5" x2="4.2" y2="15.2"/>
    <line x1="19.8" y1="7.5" x2="22.2" y2="8.8"/>
    <line x1="19.8" y1="16.5" x2="22.2" y2="15.2"/>
  </g>
</svg>
