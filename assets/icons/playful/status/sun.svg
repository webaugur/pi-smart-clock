<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Playful cartoony sun - chunky, high-sat, bold for room visibility. Meteocons/Tabler inspired + adapted -->
  <circle cx="12" cy="12" r="5.5" fill="#FFEB3B" stroke="#F9A825" stroke-width="2.2"/>
  <!-- Thick playful rays (8 main, rounded) -->
  <g stroke="#FF9800" stroke-width="2.8" stroke-linecap="round">
    <line x1="12" y1="1.5" x2="12" y2="5"/>
    <line x1="12" y1="19" x2="12" y2="22.5"/>
    <line x1="1.5" y1="12" x2="5" y2="12"/>
    <line x1="19" y1="12" x2="22.5" y2="12"/>
    <line x1="4" y1="4" x2="7" y2="7"/>
    <line x1="17" y1="17" x2="20" y2="20"/>
    <line x1="4" y1="20" x2="7" y2="17"/>
    <line x1="17" y1="7" x2="20" y2="4"/>
  </g>
</svg>
