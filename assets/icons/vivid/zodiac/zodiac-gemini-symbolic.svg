<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed Gemini twins -->
  <circle cx="12" cy="12" r="10.5" fill="#0288D1"/>
  <circle cx="12" cy="12" r="9" fill="none" stroke="#B3E5FC" stroke-width="1.2"/>
  <!-- Two stylized figures -->
  <!-- Left twin -->
  <circle cx="8" cy="8" r="2" fill="#81D4FA"/>
  <path d="M8 10 Q7 14 6 16" fill="none" stroke="#81D4FA" stroke-width="2"/>
  <path d="M8 10 Q9 14 10 16" fill="none" stroke="#81D4FA" stroke-width="2"/>
  <!-- Right twin -->
  <circle cx="16" cy="8" r="2" fill="#81D4FA"/>
  <path d="M16 10 Q15 14 14 16" fill="none" stroke="#81D4FA" stroke-width="2"/>
  <path d="M16 10 Q17 14 18 16" fill="none" stroke="#81D4FA" stroke-width="2"/>
  <!-- Connecting line -->
  <path d="M10 12 Q12 11 14 12" fill="none" stroke="#E1F5FE" stroke-width="1.5" stroke-dasharray="1,1"/>
  <!-- Stars accent -->
  <circle cx="7" cy="5" r="0.8" fill="#E1F5FE"/>
  <circle cx="17" cy="5" r="0.8" fill="#E1F5FE"/>
</svg>