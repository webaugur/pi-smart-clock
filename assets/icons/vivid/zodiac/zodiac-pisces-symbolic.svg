<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed Pisces two fish -->
  <circle cx="12" cy="12" r="10.5" fill="#E64A19"/>
  <circle cx="12" cy="12" r="9" fill="none" stroke="#FFCCBC" stroke-width="1.2"/>
  <!-- Two fish circling -->
  <!-- Left fish -->
  <ellipse cx="8" cy="10" rx="3" ry="1.5" fill="#FF8A65" transform="rotate(-30 8 10)"/>
  <path d="M5 10 Q4 9 3 10.5" fill="none" stroke="#FFCCBC" stroke-width="1.5"/>
  <!-- Right fish -->
  <ellipse cx="16" cy="14" rx="3" ry="1.5" fill="#FF8A65" transform="rotate(150 16 14)"/>
  <path d="M19 14 Q20 15 21 13.5" fill="none" stroke="#FFCCBC" stroke-width="1.5"/>
  <!-- Connecting line and tail details -->
  <path d="M10 11 Q12 12 14 13" fill="none" stroke="#FFCCBC" stroke-width="1" stroke-dasharray="2,1"/>
  <!-- Fins -->
  <path d="M6 9 L4 8" fill="none" stroke="#FF8A65" stroke-width="1.2"/>
  <path d="M18 15 L20 16" fill="none" stroke="#FF8A65" stroke-width="1.2"/>
