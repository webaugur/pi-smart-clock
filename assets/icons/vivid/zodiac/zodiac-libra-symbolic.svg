<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed Libra scales -->
  <circle cx="12" cy="12" r="10.5" fill="#1E88E5"/>
  <circle cx="12" cy="12" r="9" fill="none" stroke="#BBDEFB" stroke-width="1.2"/>
  <!-- Central pillar -->
  <rect x="11.3" y="5" width="1.4" height="10" fill="#90CAF9"/>
  <!-- Balance beam -->
  <rect x="5" y="7.5" width="14" height="1.2" rx="0.3" fill="#90CAF9"/>
  <!-- Left and right pans with chains -->
  <ellipse cx="6.5" cy="15" rx="2.5" ry="1.2" fill="#64B5F6"/>
  <ellipse cx="17.5" cy="15" rx="2.5" ry="1.2" fill="#64B5F6"/>
  <line x1="7" y1="8.5" x2="6.5" y2="13.5" stroke="#BBDEFB" stroke-width="1"/>
  <line x1="17" y1="8.5" x2="17.5" y2="13.5" stroke="#BBDEFB" stroke-width="1"/>
  <!-- Small weights for detail -->
  <circle cx="6.5" cy="16.5" r="0.6" fill="#0D47A1"/>
  <circle cx="17.5" cy="16.5" r="0.6" fill="#0D47A1"/>
</svg>