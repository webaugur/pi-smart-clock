<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed Leo lion -->
  <circle cx="12" cy="12" r="10.5" fill="#FF9800"/>
  <circle cx="12" cy="12" r="9" fill="none" stroke="#FFE0B2" stroke-width="1.2"/>
  <!-- Mane - layered circles and curves for detail -->
  <circle cx="12" cy="11" r="3.5" fill="#FFB74D"/>
  <g fill="#FFCC80" opacity="0.7">
    <circle cx="8" cy="8" r="1.8"/>
    <circle cx="16" cy="8" r="1.8"/>
    <circle cx="7" cy="13" r="1.5"/>
    <circle cx="17" cy="13" r="1.5"/>
    <circle cx="10" cy="5.5" r="1.3"/>
    <circle cx="14" cy="5.5" r="1.3"/>
  </g>
  <!-- Face -->
  <circle cx="12" cy="11" r="2" fill="#FFCC80"/>
  <!-- Ears and whiskers -->
  <path d="M9 9 Q8 7 10 7" fill="none" stroke="#FF8A65" stroke-width="1"/>
  <path d="M15 9 Q16 7 14 7" fill="none" stroke="#FF8A65" stroke-width="1"/>
  <!-- Whiskers -->
  <line x1="10" y1="11" x2="7" y2="10.5" stroke="#FF8A65" stroke-width="0.7"/>
  <line x1="14" y1="11" x2="17" y2="10.5" stroke="#FF8A65" stroke-width="0.7"/>
</svg>