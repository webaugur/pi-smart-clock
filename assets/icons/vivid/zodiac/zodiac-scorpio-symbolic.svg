<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed Scorpio scorpion -->
  <circle cx="12" cy="12" r="10.5" fill="#D81B60"/>
  <circle cx="12" cy="12" r="9" fill="none" stroke="#F8BBD9" stroke-width="1.2"/>
  <!-- Body segments -->
  <ellipse cx="10" cy="10" rx="2.5" ry="2" fill="#F48FB1"/>
  <ellipse cx="13" cy="12" rx="2" ry="1.8" fill="#F48FB1"/>
  <ellipse cx="15" cy="14" rx="1.5" ry="1.5" fill="#F48FB1"/>
  <!-- Tail curve with stinger -->
  <path d="M15 15 Q18 17 19 20 Q17 22 15 20" fill="none" stroke="#AD1457" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="15,20 14,19 16,18.5" fill="#AD1457"/>
  <!-- Legs -->
  <g stroke="#F48FB1" stroke-width="1.5" stroke-linecap="round">
    <line x1="8" y1="9" x2="5" y2="7"/>
    <line x1="8" y1="11" x2="4" y2="10"/>
    <line x1="9" y1="13" x2="5" y2="13"/>
    <line x1="14" y1="10" x2="17" y2="8"/>
    <line x1="15" y1="12" x2="19" y2="11"/>
    <line x1="16" y1="14" x2="19" y2="14"/>
  </g>
  <!-- Claws -->
  <path d="M7 8 Q4 6 5 4" fill="none" stroke="#F48FB1" stroke-width="2"/>
  <path d="M17 9 Q20 7 19 5" fill="none" stroke="#F48FB1" stroke-width="2"/>
</svg>