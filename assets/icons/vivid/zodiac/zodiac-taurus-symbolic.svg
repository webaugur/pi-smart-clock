<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed Taurus bull head with horns -->
  <circle cx="12" cy="12" r="10.5" fill="#009688"/>
  <circle cx="12" cy="12" r="9" fill="none" stroke="#B2DFDB" stroke-width="1.2"/>
  <!-- Bull head -->
  <ellipse cx="12" cy="11" rx="4" ry="3.5" fill="#80CBC4"/>
  <!-- Horns - curved and thick -->
  <path d="M8 8 Q5 3 7 2 Q10 3 9 7" fill="none" stroke="#B2DFDB" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M16 8 Q19 3 17 2 Q14 3 15 7" fill="none" stroke="#B2DFDB" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Ears and snout detail -->
  <ellipse cx="7.5" cy="10" rx="1.2" ry="2" fill="#4DB6AC" transform="rotate(-20 7.5 10)"/>
  <ellipse cx="16.5" cy="10" rx="1.2" ry="2" fill="#4DB6AC" transform="rotate(20 16.5 10)"/>
  <ellipse cx="12" cy="13" rx="1.8" ry="1" fill="#00796B"/>
  <!-- Small nose detail -->
  <circle cx="10.5" cy="13.5" r="0.5" fill="#B2DFDB"/>
  <circle cx="13.5" cy="13.5" r="0.5" fill="#B2DFDB"/>
</svg>