<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed Sagittarius archer with arrow and bow -->
  <circle cx="12" cy="12" r="10.5" fill="#7E57C2"/>
  <circle cx="12" cy="12" r="9" fill="none" stroke="#D1C4E9" stroke-width="1.2"/>
  <!-- Archer body and head -->
  <circle cx="10" cy="9" r="1.8" fill="#B39DDB"/>
  <path d="M10 11 L9 16" fill="none" stroke="#B39DDB" stroke-width="2.2"/>
  <!-- Bow -->
  <path d="M14 7 Q17 11 14 15" fill="none" stroke="#D1C4E9" stroke-width="2"/>
  <!-- Arrow -->
  <line x1="8" y1="10" x2="16" y2="12" stroke="#FFEB3B" stroke-width="1.8"/>
  <polygon points="16,12 14,10.5 14,13.5" fill="#FFEB3B"/>
  <!-- Legs and arm detail -->
  <path d="M9 16 Q7 19 8 21" fill="none" stroke="#B39DDB" stroke-width="1.8"/>
  <path d="M11 12 Q13 13 12 15" fill="none" stroke="#B39DDB" stroke-width="1.5"/>
</svg>