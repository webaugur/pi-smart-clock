<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed Aries with horns and circle - more path segments for visual interest -->
  <circle cx="12" cy="12" r="10.5" fill="#E53935"/>
  <!-- Outer ring detail -->
  <circle cx="12" cy="12" r="9" fill="none" stroke="#FFCDD2" stroke-width="1.2"/>
  <!-- Ram horns - more curved and detailed -->
  <path d="M7 8 Q5 5 8 3 Q11 4 10 7 Q9 5.5 7 8" fill="none" stroke="#FFEBEE" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M17 8 Q19 5 16 3 Q13 4 14 7 Q15 5.5 17 8" fill="none" stroke="#FFEBEE" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Inner head detail -->
  <circle cx="12" cy="10" r="2.5" fill="#FFCDD2"/>
  <!-- Small decorative dots on horns -->
  <circle cx="6.5" cy="5" r="0.7" fill="#B71C1C"/>
  <circle cx="17.5" cy="5" r="0.7" fill="#B71C1C"/>
</svg>