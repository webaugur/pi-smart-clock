<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed colorful calendar - more grid, dates, 3D effect, header details -->
  <!-- Shadow -->
  <rect x="4" y="6" width="18" height="16" rx="2" fill="#0D47A1"/>
  <!-- Main body -->
  <rect x="3" y="5" width="18" height="16" rx="2" fill="#42A5F5"/>
  <!-- Header bar with gradient effect -->
  <rect x="3" y="5" width="18" height="5" fill="#1565C0"/>
  <rect x="3" y="5" width="18" height="2" fill="#1E88E5" opacity="0.6"/>
  <!-- Binding rings with detail -->
  <rect x="5.5" y="2" width="2.2" height="5" rx="0.5" fill="#0D47A1"/>
  <rect x="16.3" y="2" width="2.2" height="5" rx="0.5" fill="#0D47A1"/>
  <!-- Inner rings highlight -->
  <rect x="5.8" y="2.3" width="1.6" height="1" fill="#42A5F5"/>
  <rect x="16.6" y="2.3" width="1.6" height="1" fill="#42A5F5"/>
  <!-- Calendar grid with more detail (dates) -->
  <g fill="#E3F2FD" font-size="3.5" font-family="sans-serif" text-anchor="middle">
    <!-- Row 1 -->
    <text x="7" y="13">1</text>
    <text x="11" y="13">2</text>
    <text x="15" y="13">3</text>
    <text x="19" y="13">4</text>
    <!-- Row 2 -->
    <text x="7" y="17">5</text>
    <text x="11" y="17">6</text>
    <text x="15" y="17">7</text>
    <text x="19" y="17">8</text>
    <!-- Row 3 -->
    <text x="7" y="21">9</text>
    <text x="11" y="21">10</text>
    <text x="15" y="21">11</text>
    <text x="19" y="21">12</text>
  </g>
  <!-- Grid lines -->
  <g stroke="#1E88E5" stroke-width="0.6">
    <line x1="5" y1="14.5" x2="20" y2="14.5"/>
    <line x1="5" y1="18.5" x2="20" y2="18.5"/>
    <line x1="9" y1="10" x2="9" y2="22"/>
    <line x1="13" y1="10" x2="13" y2="22"/>
    <line x1="17" y1="10" x2="17" y2="22"/>
  </g>
</svg>