<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed scattered showers - multi-puff cloud, varied drop shapes and sizes for more detail -->
  <!-- Layered cloud -->
  <path d="M4 10 Q2 14 7 14.5 Q11 16.5 15 14.5 Q18 13 17 10.5" fill="#0288D1"/>
  <path d="M6 8.5 Q4.5 11.5 8 12 Q12.5 13.5 16 12" fill="#4FC3F7" opacity="0.85"/>
  <!-- Varied rain drops (different lengths and angles) -->
  <g fill="#29B6F6">
    <!-- Main drops -->
    <ellipse cx="7" cy="17.5" rx="1.1" ry="2.2" transform="rotate(-10 7 17.5)"/>
    <ellipse cx="11" cy="19" rx="1" ry="2" transform="rotate(5 11 19)"/>
    <ellipse cx="15" cy="17.8" rx="1.2" ry="2.1" transform="rotate(-15 15 17.8)"/>
    <!-- Smaller scattered drops -->
    <circle cx="5" cy="20.5" r="0.9"/>
    <ellipse cx="18" cy="19.5" rx="0.7" ry="1.4" transform="rotate(8 18 19.5)"/>
    <circle cx="9" cy="21" r="0.75"/>
  </g>
</svg>