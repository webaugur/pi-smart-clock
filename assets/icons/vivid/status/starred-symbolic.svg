<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Highly detailed 5-point star with shading, highlight, and outline for room visibility -->
  <!-- Shadow layer -->
  <polygon points="12,3 14.8,9.5 22,9.5 16.5,14 18.5,21 12,16.5 5.5,21 7.5,14 2,9.5 9.2,9.5" fill="#E65100"/>
  <!-- Main star -->
  <polygon points="12,2 15,9.2 23,9.2 17,14.2 19,22 12,16.8 5,22 7,14.2 1,9.2 9,9.2" fill="#FFD54F"/>
  <!-- Inner highlight for 3D effect -->
  <polygon points="12,3.5 13.5,7.5 17,7.5 14.5,10.5 15.5,14 12,11.5 8.5,14 9.5,10.5 7,7.5 10.5,7.5" fill="#FFEB3B" opacity="0.6"/>
  <!-- Dark outline for definition -->
  <polygon points="12,2 15,9.2 23,9.2 17,14.2 19,22 12,16.8 5,22 7,14.2 1,9.2 9,9.2" fill="none" stroke="#FF6F00" stroke-width="1.5"/>
</svg>