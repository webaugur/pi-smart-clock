<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed fog with layered clouds and multiple mist lines - more atmospheric detail -->
  <path d="M4 10 Q2.5 13.5 7 14 Q11.5 15.5 16 14 Q18.5 12.5 17.5 10.5" fill="#90A4AE"/>
  <path d="M5 12.5 Q4 15 8 15.5 Q13 17 17 15.5" fill="#B0BEC5" opacity="0.85"/>
  <!-- Multiple horizontal fog/mist bands for depth and distance readability -->
  <g stroke="#78909C" stroke-width="1.6" stroke-linecap="round" opacity="0.75">
    <line x1="3" y1="16.5" x2="21" y2="16.5"/>
    <line x1="4" y1="18" x2="20" y2="18"/>
    <line x1="2.5" y1="19.5" x2="21.5" y2="19.5"/>
    <line x1="5" y1="21" x2="19" y2="21"/>
  </g>
  <!-- Subtle vertical wisps -->
  <g stroke="#607D8B" stroke-width="0.8" opacity="0.5">
    <line x1="7" y1="15" x2="6" y2="20"/>
    <line x1="12" y1="14.5" x2="13" y2="21"/>
    <line x1="16" y1="15.5" x2="15.5" y2="19.5"/>
  </g>
</svg>