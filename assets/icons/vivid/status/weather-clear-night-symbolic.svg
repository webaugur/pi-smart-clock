<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed crescent moon with craters and glow for night - more visual interest -->
  <!-- Glow -->
  <path d="M16 3 Q22 9 19 16 Q14 20 8 17 Q4 10 8 5 Q11 2 16 3" fill="#FFF9C4" opacity="0.4"/>
  <!-- Main crescent -->
  <path d="M15 4 Q20 8 18 14 Q14 18 9 16 Q6 11 9 6 Q12 3 15 4" fill="#FFEB3B"/>
  <!-- Inner crescent to create the moon shape -->
  <path d="M12 5 Q15 7 14 12 Q12 15 10 13 Q8 9 10 6" fill="#FFF59D"/>
  <!-- Craters for detail -->
  <circle cx="11" cy="8" r="1.2" fill="#FDD835" opacity="0.7"/>
  <circle cx="13.5" cy="10.5" r="0.9" fill="#FDD835" opacity="0.6"/>
  <circle cx="10.5" cy="11" r="0.7" fill="#FDD835" opacity="0.5"/>
  <!-- Stars with more detail (points) -->
  <g fill="#FFFFFF">
    <!-- 4-point star -->
    <polygon points="5,5 5.5,6.5 7,6.5 5.8,7.2 6.2,8.5 5,7.8 3.8,8.5 4.2,7.2 3,6.5 4.5,6.5" />
    <polygon points="19,4 19.4,5.2 20.5,5.2 19.7,5.7 20,6.8 19,6.3 18,6.8 18.3,5.7 17.5,5.2 18.6,5.2" />
    <circle cx="5" cy="18" r="1.1"/>
    <circle cx="20" cy="19" r="0.85"/>
    <!-- Extra small stars -->
    <circle cx="8" cy="3" r="0.6"/>
    <circle cx="17" cy="8" r="0.5"/>
    <circle cx="3" cy="14" r="0.55"/>
  </g>
</svg>