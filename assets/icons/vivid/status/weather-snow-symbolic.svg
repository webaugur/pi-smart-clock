<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed snow cloud with intricate snowflakes - more flakes with arms for better detail at distance -->
  <!-- Layered fluffy cloud -->
  <path d="M4 10 Q2 14.5 7 15 Q12 17 16.5 15 Q19 13.5 18 10.5" fill="#E3F2FD"/>
  <path d="M6 8 Q4.5 11 8 11.5 Q12.5 13 16 11.5" fill="#BBDEFB" opacity="0.75"/>
  <!-- Complex snowflakes -->
  <g stroke="#90CAF9" stroke-width="1.4" stroke-linecap="round">
    <!-- Detailed 6-arm flake 1 -->
    <line x1="6" y1="17" x2="8" y2="19"/>
    <line x1="8" y1="17" x2="6" y2="19"/>
    <line x1="7" y1="16.2" x2="7" y2="19.8"/>
    <!-- Small branches -->
    <line x1="6.3" y1="17.5" x2="6.8" y2="17.8"/>
    <line x1="7.7" y1="17.5" x2="7.2" y2="17.8"/>
    <!-- Detailed 6-arm flake 2 -->
    <line x1="11" y1="18" x2="13.5" y2="20.5"/>
    <line x1="13.5" y1="18" x2="11" y2="20.5"/>
    <line x1="12.25" y1="17.2" x2="12.25" y2="21.3"/>
    <line x1="11.4" y1="18.6" x2="12" y2="19"/>
    <line x1="13.1" y1="18.6" x2="12.5" y2="19"/>
    <!-- Smaller flakes -->
    <line x1="15" y1="17.5" x2="16.5" y2="19"/>
    <line x1="16.5" y1="17.5" x2="15" y2="19"/>
    <line x1="15.75" y1="17" x2="15.75" y2="19.5"/>
    <line x1="17.5" y1="18.5" x2="19" y2="20"/>
    <line x1="19" y1="18.5" x2="17.5" y2="20"/>
  </g>
</svg>