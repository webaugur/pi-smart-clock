<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Highly detailed thunderstorm - dramatic layered cloud + multi-segment lightning with glow -->
  <!-- Dark stormy cloud base -->
  <path d="M3 9 Q1 14 6 14.5 Q11 17.5 16 14.5 Q19.5 12.5 18 9.5" fill="#37474F"/>
  <!-- Mid cloud layers -->
  <path d="M4.5 7 Q3 11 7 11.5 Q11.5 13.5 16 11.5" fill="#546E7A" opacity="0.85"/>
  <!-- Highlight on top -->
  <path d="M5.5 5.5 Q4.5 8.5 8 9 Q12 10.5 15.5 9" fill="#78909C" opacity="0.6"/>
  <!-- Jagged detailed lightning bolt -->
  <path d="M10.5 15 L13 15 L11 19 L14 16.5 L12 16.5 L15 11 L12 14 L10.5 13 Z" fill="#FFEB3B"/>
  <!-- Glow/secondary bolt -->
  <path d="M11 15.5 L12.5 15.5 L11.5 18 L13.5 16.2 L12.2 16.2 L14 12.5" fill="#FFF176" opacity="0.6"/>
  <!-- Small accent sparks -->
  <circle cx="9.5" cy="17" r="0.6" fill="#FFEB3B"/>
  <circle cx="14.5" cy="14" r="0.5" fill="#FFEB3B"/>
</svg>