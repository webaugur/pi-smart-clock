    <ellipse cx="8" cy="17.5" rx="1" ry="2.5" transform="rotate(6 8 17.5)"/>
    <ellipse cx="11" cy="15.8" rx="1.1" ry="2.6" transform="rotate(-8 11 15.8)"/>
