<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed sun + puffy cloud for partly cloudy - more volume and rays -->
  <!-- Sun with more detail -->
  <circle cx="8" cy="8" r="3.5" fill="#FFD54F"/>
  <circle cx="8" cy="8" r="2.2" fill="#FFEB3B"/>
  <!-- Face on sun -->
  <circle cx="6.5" cy="6.8" r="0.5" fill="#FF8F00"/>
  <circle cx="9.5" cy="6.8" r="0.5" fill="#FF8F00"/>
  <path d="M6.5 9.5 Q8 10.2 9.5 9.5" fill="none" stroke="#FF8F00" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Detailed rays -->
  <g stroke="#FF8F00" stroke-width="1.5" stroke-linecap="round">
    <line x1="8" y1="2.5" x2="8" y2="4.5"/>
    <line x1="8" y1="11.5" x2="8" y2="13.5"/>
    <line x1="2" y1="8" x2="4" y2="8"/>
    <line x1="12" y1="8" x2="14" y2="8"/>
    <line x1="3.5" y1="3.5" x2="5" y2="5"/>
    <line x1="11" y1="11" x2="12.5" y2="12.5"/>
    <line x1="3.5" y1="12.5" x2="5" y2="11"/>
    <line x1="11" y1="4" x2="12.5" y2="5.5"/>
  </g>
  <!-- Multi-layer puffy cloud for depth -->
  <path d="M5 13 Q3.5 16 7 16.5 Q10 18 14 16.5 Q17 15.5 16 13.5 Q14.5 12.5 11 13" fill="#81D4FA" stroke="#4FC3F7" stroke-width="0.8"/>
  <path d="M7 11 Q5.5 13.5 8.5 14 Q12 15 15 13.5" fill="#B3E5FC" stroke="#4FC3F7" stroke-width="0.6"/>
</svg>