# Bottom panel slot assignments (slot=module).
# Slots: b_left, b_mid, b_right
# Modules: weather, calendar, holidays
b_left=weather
b_mid=calendar
b_right=holidays

# New upper row (second layer above the classic bottom row) - same module format.
# The three new astronomy modules live here by default in the current build:
#   lunar    - lunar dates + NASA HD phase photos (powered by full lunar engine)
#   zodiac   - modern zodiac symbols (playful cartoony icons) + Venus/synodic cycles
#   pentagram (or venus) - live Venus-Moon pentagram cycle visualizer
#
# Example (when upper row config is fully exposed):
# u_left=lunar
# u_mid=zodiac
# u_right=pentagram
#
# You can also assign any module (including the new ones) to the bottom row if desired.
