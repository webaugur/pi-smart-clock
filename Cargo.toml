[package]
name = "pi-smart-clock"
version = "0.2.0"
edition = "2021"

[features]
default = ["linux-full"]
linux-full = ["sdl2", "tokio/full", "reqwest", "cron"]
pico-dvi = ["embassy-executor", "embassy-rp", "embassy-time", "embedded-graphics", "cortex-m-rt"]

[dependencies]
sdl2 = { version = "0.38", features = ["ttf", "mixer"], optional = true }
tokio = { version = "1", features = ["full"], optional = true }
chrono = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12", features = ["json"], optional = true }
cron = { version = "0.12", optional = true }
embassy-executor = { version = "0.6", features = ["task-arena"], optional = true }
embassy-rp = { version = "0.4", features = ["time-driver"], optional = true }
embassy-time = { version = "0.3", optional = true }
embedded-graphics = { version = "0.8", optional = true }
cortex-m-rt = { version = "0.7", optional = true }