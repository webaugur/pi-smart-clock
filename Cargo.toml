[package]
name = "pi-smart-clock"
version = "0.1.0"
edition = "2021"
description = "Smart clock for Raspberry Pi (SDL2 Linux dev) and Pico DVI (Embassy)"
readme = "README.md"
default-run = "pi-smart-clock"

[lib]
name = "pi_smart_clock"
path = "src/lib.rs"

[[bin]]
name = "pi-smart-clock"
path = "src/main.rs"
required-features = ["linux-full"]

[[bin]]
name = "pi-smart-clock-firmware"
path = "firmware/main.rs"
required-features = ["pico-dvi"]

[features]
default = ["linux-full"]
linux-full = ["dep:sdl2", "sdl2/ttf", "sdl2/mixer", "dep:tokio"]
pico-dvi = [
    "embassy-executor",
    "embassy-rp",
    "embassy-time",
    "embedded-graphics",
    "cortex-m-rt",
]

[dependencies]
sdl2 = { version = "0.38", optional = true }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"], optional = true }
chrono = { version = "0.4", features = ["clock"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

embassy-executor = { version = "0.6", optional = true, features = ["arch-cortex-m", "executor-thread"] }
embassy-rp = { version = "0.4", optional = true, features = ["time-driver", "critical-section-impl"] }
embassy-time = { version = "0.4", optional = true }
embedded-graphics = { version = "0.8", optional = true }
cortex-m-rt = { version = "0.7", optional = true }
