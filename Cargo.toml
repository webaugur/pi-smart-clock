[package]
name = "pi-smart-clock"
version = "0.1.0"
edition = "2021"

[features]
default = ["linux-full"]
linux-full = ["sdl2", "chrono"]
pico-dvi = ["embassy-executor", "embassy-rp", "embedded-graphics"]

[dependencies]
# Linux / Desktop
sdl2 = { version = "0.38", features = ["ttf", "mixer"], optional = true }
chrono = { version = "0.4", optional = true }

# Pico / Embedded
embassy-executor = { version = "0.6", features = ["task-arena"], optional = true }
embassy-rp = { version = "0.4", optional = true }
embedded-graphics = { version = "0.8", optional = true }
