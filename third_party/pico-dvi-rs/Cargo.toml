[package]
name = "pico-dvi-rs"
authors = ["Raph Levien <raph.levien@gmail.com>", "Zachary Kohnen <me@dusterthefirst.com>"]
description = "Bit-banged DVI video output on the Raspberry Pi Pico"
license = "BSD-3-Clause"
repository = "https://github.com/DusterTheFirst/pico-dvi-rs"
edition = "2021"
resolver = "2"
publish = false
version = "0.0.1"

[lib]
path = "src/lib.rs"

[[bin]]
name = "pico-dvi-demo"
path = "src/bin/demo.rs"
required-features = ["demo"]

[features]
default = []
demo = ["dep:rp-pico", "dep:defmt", "dep:defmt-rtt", "dep:panic-probe"]

[dependencies]
cortex-m = "0.7.7"
cortex-m-rt = "0.7.3"
embedded-alloc = "0.5"
embedded-hal = "0.2.7"
fugit = { version = "0.3.6", default-features = false }
pio = "0.2.1"
pio-proc = "0.2.1"
rp2040-hal = { version = "0.9.0", features = ["rt"] }

defmt = { version = "0.3.2", optional = true }
defmt-rtt = { version = "0.4.0", optional = true }
panic-probe = { version = "0.3.0", optional = true, features = ["print-defmt"] }

rp-pico = { version = "0.8.0", optional = true, features = ["rom-v2-intrinsics", "rp2040-e5"] }